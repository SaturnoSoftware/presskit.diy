name: Tests & Coverage

# Trigger configuration
on:
  # Run on push to main or CI-CD branch
  push:
    branches:
      - main
      - CI-CD
  # Run on pull requests to main
  pull_request:
    branches:
      - main

# Environment configuration
env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test Suite & Coverage
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from the repository
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Setup Node.js runtime
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the canonical Saturno verification wrapper
      - name: Run Saturno build wrapper
        run: pwsh -NoLogo -NoProfile -File ./Scripts/build.ps1 -ProjectRoot . -BuildNumber 0

      # Step 5: Stage the canonical Saturno package output
      - name: Run Saturno package wrapper
        run: pwsh -NoLogo -NoProfile -File ./Scripts/package.ps1 -ProjectRoot . -BuildNumber 0

      # Step 6: Collect coverage as secondary CI reporting
      # Note: StandardJS linting is built into npm test (see package.json)
      # Note: Jest coverageThreshold enforces 85% coverage (see package.json jest config)
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary

      # Step 6b: Verify coverage threshold (redundant check for clarity in logs)
      - name: Verify coverage threshold met
        run: npm test -- --coverage --bail

      # Step 7: Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
